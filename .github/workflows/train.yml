name: Train RNN Chatbot

on:
  workflow_dispatch:
    inputs:
      epochs:
        description: '训练轮数'
        required: false
        default: '100'
        type: string
      max_pairs:
        description: '对话对数量'
        required: false
        default: '5000'
        type: string

jobs:
  train:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install numpy
    
    - name: Download dataset
      run: |
        mkdir -p data
        curl -L -o dataset.zip http://www.cs.cornell.edu/~cristian/data/cornell_movie_dialogs_corpus.zip
        unzip -q dataset.zip
        cp cornell_movie_dialogs_corpus/movie_lines.txt data/
        cp cornell_movie_dialogs_corpus/movie_conversations.txt data/
        rm -rf cornell_movie_dialogs_corpus dataset.zip
        echo "Dataset ready"
    
    - name: Train model
      run: |
        python train_actions.py --epochs ${{ github.event.inputs.epochs || 100 }} --max_pairs ${{ github.event.inputs.max_pairs || 5000 }}
    
    - name: Upload model
      uses: actions/upload-artifact@v4
      with:
        name: trained-model
        path: |
          rnn_model.pkl
          model_epoch_*.pkl
        retention-days: 30
